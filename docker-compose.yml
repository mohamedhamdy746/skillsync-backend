version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillsync-db
    environment:
      POSTGRES_DB: skillsync
      POSTGRES_USER: skillsync_user
      POSTGRES_PASSWORD: skillsync123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillsync_user -d skillsync"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: skillsync-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/skillsync
      SPRING_DATASOURCE_USERNAME: skillsync_user
      SPRING_DATASOURCE_PASSWORD: skillsync123
      APP_JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      APP_JWT_EXPIRATION: 86400000
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: