# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/skillsync
spring.datasource.username=skillsync_user
spring.datasource.password=skillsync123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Hikari (connection pool) settings - explicitly set to avoid 'undefined/unknown' in logs
# These settings make the pool sizes and autocommit visible to Hibernate logging.
spring.datasource.hikari.pool-name=HikariPool-1
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.auto-commit=true
# Optional: connection init SQL or test query if you want explicit validation
# spring.datasource.hikari.connection-test-query=SELECT 1

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# App
server.port=8080
spring.application.name=skillsync-backend

# CORS
spring.web.cors.allowed-origins=http://localhost:5173

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html